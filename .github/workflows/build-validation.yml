name: Build Validation

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y build-essential

      - name: Build
        run: make all
